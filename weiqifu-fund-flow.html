<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>微企付资金流</title>
<style>
  body { margin: 0; padding: 28px; background: #FFFFFF; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .wrap { max-width: 1820px; margin: 0 auto; }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1820 680" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F2329"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .header { font-size: 17px; font-weight: 600; }
      .node   { font-size: 15px; font-weight: 600; }
      .lbl    { font-size: 13px; fill: #1F2329; font-weight: 400; }
      .lbl-x  { font-size: 14px; fill: #1F2329; font-weight: 500; }
    </style>
  </defs>

  <!--
    泳道规划（从左到右）：
    1. 付款方（企业付款方）         x=40,  宽200
    2. 微企付                        x=290, 宽680（含商户号、手续费账户、微企付平台账户）
    3. 收款商户                      x=1020,宽220
    4. 存管银行（浙商银行）          x=1300,宽220
    5. 平台方/ISV                    x=1580,宽200

    走廊规划：
    走廊 A   y=110   —— D+1提现主线（商户号上行 → 右到商户对公）
    走廊 B   y=310   —— 分账/充值走廊
    走廊 D   y=610   —— 底部走廊（手续费路径）

    节点行：
    R1  y=180  —— 主流程节点
    R2  y=400  —— 第二行节点（手续费账户等）
    R3  y=520  —— 第三行节点（微企付平台对公户）
  -->

  <!-- ============ Header bar ============ -->
  <g filter="url(#soft-shadow)">
    <rect x="40"   y="20" width="200" height="42" rx="9" fill="#5567AC"/>
    <rect x="290"  y="20" width="680" height="42" rx="9" fill="#22C55E"/>
    <rect x="1020" y="20" width="220" height="42" rx="9" fill="#7B4FBA"/>
    <rect x="1300" y="20" width="220" height="42" rx="9" fill="#5C5C61"/>
    <rect x="1580" y="20" width="200" height="42" rx="9" fill="#E0D6F4"/>
  </g>
  <text x="140"  y="47" text-anchor="middle" fill="#FFFFFF" class="header">付款方</text>
  <text x="630"  y="47" text-anchor="middle" fill="#FFFFFF" class="header">微企付</text>
  <text x="1130" y="47" text-anchor="middle" fill="#FFFFFF" class="header">收款商户</text>
  <text x="1410" y="47" text-anchor="middle" fill="#FFFFFF" class="header">存管银行</text>
  <text x="1680" y="47" text-anchor="middle" fill="#3D2A5C" class="header">平台方/ISV</text>


  <!-- ============ R1 第一行节点 y=180 ============ -->
  <g filter="url(#soft-shadow)">
    <!-- 付款方 -->
    <rect x="40"   y="180" width="200" height="46" rx="23" fill="#5567AC"/>
    <!-- 微企付商户号 -->
    <rect x="290"  y="180" width="220" height="46" rx="23" fill="#22C55E"/>
    <!-- 微企付平台账户（中间转接） -->
    <rect x="570"  y="180" width="200" height="46" rx="23" fill="#22C55E"/>
    <!-- 商户对公户 -->
    <rect x="1020" y="180" width="220" height="46" rx="23" fill="#7B4FBA"/>
    <!-- 浙商存管户（与商户号托管关系） -->
    <rect x="1300" y="180" width="220" height="46" rx="23" fill="#5C5C61"/>
    <!-- 平台方对公户 -->
    <rect x="1580" y="180" width="200" height="46" rx="23" fill="#E0D6F4"/>
  </g>
  <text x="140"  y="209" text-anchor="middle" fill="#FFFFFF" class="node">企业付款方</text>
  <text x="400"  y="204" text-anchor="middle" fill="#FFFFFF" class="node">微企付</text>
  <text x="400"  y="221" text-anchor="middle" fill="#FFFFFF" class="node">商户号</text>
  <text x="670"  y="204" text-anchor="middle" fill="#FFFFFF" class="node">微企付</text>
  <text x="670"  y="221" text-anchor="middle" fill="#FFFFFF" class="node">平台账户</text>
  <text x="1130" y="204" text-anchor="middle" fill="#FFFFFF" class="node">收款商户</text>
  <text x="1130" y="221" text-anchor="middle" fill="#FFFFFF" class="node">对公户</text>
  <text x="1410" y="204" text-anchor="middle" fill="#FFFFFF" class="node">浙商银行</text>
  <text x="1410" y="221" text-anchor="middle" fill="#FFFFFF" class="node">存管户</text>
  <text x="1680" y="204" text-anchor="middle" fill="#3D2A5C" class="node">平台方对公户</text>


  <!-- ============ R2 第二行节点 y=400 ============ -->
  <g filter="url(#soft-shadow)">
    <!-- 微企付手续费账户 -->
    <rect x="290"  y="400" width="220" height="46" rx="23" fill="#22C55E"/>
    <!-- 商户专用手续费子账户 -->
    <rect x="570"  y="400" width="200" height="46" rx="23" fill="#22C55E"/>
  </g>
  <text x="400"  y="424" text-anchor="middle" fill="#FFFFFF" class="node">微企付手续费账户</text>
  <text x="670"  y="424" text-anchor="middle" fill="#FFFFFF" class="node">商户手续费子账户</text>


  <!-- ============ R3 第三行节点 y=530 ============ -->
  <g filter="url(#soft-shadow)">
    <!-- 微企付对公户 -->
    <rect x="570"  y="530" width="200" height="46" rx="23" fill="#22C55E"/>
  </g>
  <text x="670"  y="554" text-anchor="middle" fill="#FFFFFF" class="node">微企付对公户</text>


  <!-- ============================================================ -->
  <!-- ====================== 连线 =================================  -->
  <!-- ============================================================ -->

  <!-- ① 企业付款方 → 微企付商户号（实时到账） -->
  <line x1="240" y1="203" x2="285" y2="203"
        stroke="#1F2329" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="262" y="193" text-anchor="middle" class="lbl">实时到账</text>

  <!-- ② 微企付商户号 → 微企付平台账户（平行分账 / 服务费，虚线） -->
  <line x1="510" y1="203" x2="565" y2="203"
        stroke="#1F2329" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="537" y="191" text-anchor="middle" class="lbl">平行分账</text>
  <text x="537" y="222" text-anchor="middle" class="lbl">服务费</text>

  <!-- ③ 微企付商户号 → 商户对公户（D+1 全提现，走廊 A y=110） -->
  <path d="M 400,180 L 400,110 L 1130,110 L 1130,176"
        stroke="#1F2329" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="780" y="100" text-anchor="middle" class="lbl">D+1 全提现</text>

  <!-- ④ 微企付平台账户 → 平台方对公户（D+1 提现，走廊 A） -->
  <path d="M 670,180 L 670,130 L 1680,130 L 1680,176"
        stroke="#1F2329" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="1200" y="121" text-anchor="middle" class="lbl">D+1 提现</text>

  <!-- ⑤ 微企付商户号 ↔ 浙商银行存管户（资金存管，虚线双向托管，走廊 B y=310） -->
  <!-- 从浙商银行存管户左侧出，走廊 B，到商户号右侧 -->
  <path d="M 1300,203 L 1300,240 L 1300,310 L 510,310 L 510,226"
        stroke="#5C5C61" stroke-width="1.4" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow)"/>
  <text x="880" y="302" text-anchor="middle" class="lbl" fill="#5C5C61">资金存管（托管关系）</text>

  <!-- ⑥ 商户手续费子账户 → 微企付手续费账户（异号扣费，虚线） -->
  <line x1="570" y1="423" x2="515" y2="423"
        stroke="#1F2329" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="542" y="411" text-anchor="middle" class="lbl">异号扣费</text>

  <!-- ⑦ 微企付商户号 → 商户手续费子账户（手续费划拨，虚线，垂直下行） -->
  <path d="M 400,226 L 400,310 L 670,310 L 670,396"
        stroke="#1F2329" stroke-width="1.6" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow)"/>
  <text x="548" y="303" text-anchor="middle" class="lbl">手续费划拨</text>

  <!-- ⑧ 微企付手续费账户 → 微企付对公户（提现，垂直） -->
  <line x1="400" y1="446" x2="400" y2="590"
        stroke="#1F2329" stroke-width="1.6" fill="none"/>
  <path d="M 400,590 L 565,590 L 565,576"
        stroke="#1F2329" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="583" text-anchor="middle" class="lbl">归集提现</text>

  <!-- ⑨ 商户手续费子账户 → 微企付对公户（平台收益提现，走廊 D） -->
  <path d="M 670,446 L 670,530"
        stroke="#1F2329" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="497" text-anchor="start" class="lbl">提现</text>

</svg>
</div>
</body>
</html>
